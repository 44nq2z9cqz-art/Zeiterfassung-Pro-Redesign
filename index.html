<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Zeiterfassung">
  <meta name="theme-color" content="#FFFFFF">
  <title>Zeiterfassung Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <h1>Zeiterfassung</h1>
  </header>

  <!-- Tab: Heute -->
  <div id="tab-today" class="tab-content active">
    <div id="timer-section"></div>
    <div class="pausen-card">
      <h3>Heutige Pausen</h3>
      <div id="tages-pausen"><p class="no-data">Keine Pausen heute</p></div>
    </div>
  </div>

  <!-- Tab: Kalender -->
  <div id="tab-calendar" class="tab-content">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="nav-btn" onclick="Calendar.prevPeriod()">‹</button>
        <span id="cal-period-label">–</span>
        <button class="nav-btn" onclick="Calendar.nextPeriod()">›</button>
      </div>
      </div>

    <div id="calendar-container"></div>
  </div>

  <!-- Tab: Zeitkonto -->
  <div id="tab-zeitkonto" class="tab-content">
    <div id="zeitkonto-container"></div>
  </div>

  <!-- Tab: Einstellungen -->
  <div id="tab-settings" class="tab-content">
    <div id="settings-container"></div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today" onclick="App.switchTab('today')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Heute
    </button>
    <button class="tab-btn" data-tab="calendar" onclick="App.switchTab('calendar')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 14h1v4"/><path d="M16 2v4"/><path d="M3 10h18"/><path d="M8 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
      Kalender
    </button>
    <button class="tab-btn" data-tab="zeitkonto" onclick="App.switchTab('zeitkonto')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13.744 17.736a6 6 0 1 1-7.48-7.48"/><path d="M15 6h1v4"/><path d="m6.134 14.768.866-.5 2 3.464"/><circle cx="16" cy="8" r="6"/></svg>
      Zeitkonto
    </button>
    <button class="tab-btn" data-tab="settings" onclick="App.switchTab('settings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einst.
    </button>
  </nav>

  <div id="toast-container"></div>

  <!-- ══════════ MODALS ══════════ -->

  <!-- Zeit bearbeiten -->
  <div class="modal" id="edit-zeit-modal">
    <div class="modal-overlay" onclick="App.closeModal('edit-zeit-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="ez-title">Zeit bearbeiten</h3>
        <button class="modal-close" onclick="App.closeModal('edit-zeit-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="ez-date">
        <input type="hidden" id="ez-field">
        <div class="native-time-wrap">
          <input type="time" id="ez-time-input" class="native-time-input">
        </div>
        <button class="btn-primary btn-full mt-16" onclick="App.saveZeit()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Sollzeit bearbeiten -->
  <div class="modal" id="edit-soll-modal">
    <div class="modal-overlay" onclick="App.closeModal('edit-soll-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>Sollzeit bearbeiten</h3>
        <button class="modal-close" onclick="App.closeModal('edit-soll-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="es-date">
        <input type="time" class="time-native-input" id="es-time-input" step="60">
        <button class="btn-primary btn-full mt-16" onclick="App.saveSoll()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Kommentar bearbeiten -->
  <div class="modal" id="edit-kommentar-modal">
    <div class="modal-overlay" onclick="App.closeModal('edit-kommentar-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>Kommentar</h3>
        <button class="modal-close" onclick="App.closeModal('edit-kommentar-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="ek-date">
        <div class="quick-tags">
          <button class="quick-tag" data-tag="Urlaubstag"   onclick="App.setQuickKommentar('Urlaubstag',this)">🏖 Urlaub</button>
          <button class="quick-tag" data-tag="Krankheitstag" onclick="App.setQuickKommentar('Krankheitstag',this)">🤒 Krank</button>
          <button class="quick-tag" data-tag="Homeoffice"   onclick="App.setQuickKommentar('Homeoffice',this)">🏠 HO</button>
          <button class="quick-tag" data-tag="Gleittag"     onclick="App.setQuickKommentar('Gleittag',this)">↕ Gleittag</button>
          <button class="quick-tag" data-tag="Dienstreise"  onclick="App.setQuickKommentar('Dienstreise',this)">✈ Reise</button>
        </div>
        <textarea class="form-input" id="ek-kommentar" rows="3" placeholder="Freitext…"></textarea>
        <button class="btn-primary btn-full mt-8" onclick="App.saveKommentar()">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Pausen bearbeiten -->
  <div class="modal" id="edit-pausen-modal">
    <div class="modal-overlay" onclick="App.closeModal('edit-pausen-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>Pausen bearbeiten</h3>
        <button class="modal-close" onclick="App.closeModal('edit-pausen-modal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="ep-date">
        <div id="ep-pausen-list"></div>
        <div class="ep-add-row">
          <input type="time" class="form-input" id="ep-start">
          <span>–</span>
          <input type="time" class="form-input" id="ep-end">
          <button class="btn-primary btn-sm" onclick="App.addPauseFromModal()">+ Hinzufügen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Kontobuchung -->
  <div class="modal" id="entnahme-modal">
    <div class="modal-overlay" onclick="App.closeModal('entnahme-modal')"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="en-modal-title">Neue Kontobuchung</h3>
        <button class="modal-close" onclick="App.closeModal('entnahme-modal')">✕</button>
      </div>
      <div class="modal-body edit-form">
        <input type="hidden" id="en-id">
        <div class="form-group">
          <label class="form-label">Datum</label>
          <input type="date" class="form-input" id="en-datum">
        </div>
        <div class="form-group">
          <label class="form-label">Art der Buchung</label>
          <div class="sign-tabs">
            <button class="sign-tab active" id="en-sign-minus" onclick="App.setEntnahmeSign(1)">− Abzug</button>
            <button class="sign-tab" id="en-sign-plus"  onclick="App.setEntnahmeSign(-1)">+ Gutschrift</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Betrag (h:min)</label>
          <div class="native-time-wrap">
            <input type="text" id="en-time-input" class="ntf-input hhmm-input"
              value="000:00" placeholder="000:00"
              inputmode="numeric"
              onblur="this.value=this.value.replace(/[^0-9:]/g,'')">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Buchungstyp</label>
          <div class="quick-tags">
            <button class="en-tag quick-tag" data-tag="Auszahlung" onclick="App.setEntnahmeTag('Auszahlung',this)">Auszahlung</button>
            <button class="en-tag quick-tag" data-tag="Korrektur"  onclick="App.setEntnahmeTag('Korrektur',this)">Korrektur</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Grund / Beschreibung</label>
          <textarea class="form-input" id="en-grund" rows="2" placeholder="z.B. Überstundenabgeltung Q3…"></textarea>
        </div>
        <div id="en-action-row" class="en-action-row">
          <button class="btn-primary" style="flex:1" onclick="App.saveEntnahme()">Speichern</button>
          <button id="en-delete-btn" class="btn-delete-entnahme" onclick="App.deleteEntnahme()" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Auswertungen -->
  <div class="modal modal-full" id="au-modal">
    <div class="modal-overlay" onclick="App.closeModal('au-modal')"></div>
    <div class="modal-sheet modal-sheet-full">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>Auswertungen</h3>
        <button class="modal-close" onclick="App.closeModal('au-modal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="au-presets">
          <button class="au-preset" data-p="today"     onclick="App.setAuswertungRange('today')">Heute</button>
          <button class="au-preset" data-p="yesterday" onclick="App.setAuswertungRange('yesterday')">Gestern</button>
          <button class="au-preset active" data-p="week" onclick="App.setAuswertungRange('week')">Diese Woche</button>
          <button class="au-preset" data-p="month"    onclick="App.setAuswertungRange('month')">Akt. Monat</button>
          <button class="au-preset" data-p="lastmonth" onclick="App.setAuswertungRange('lastmonth')">Letzter Monat</button>
          <button class="au-preset" data-p="year"     onclick="App.setAuswertungRange('year')">Akt. Jahr</button>
          <button class="au-preset" data-p="lastyear" onclick="App.setAuswertungRange('lastyear')">Letztes Jahr</button>
        </div>
        <div class="au-range">
          <div class="form-group">
            <label class="form-label">Von</label>
            <input type="date" class="form-input" id="au-von">
          </div>
          <div class="form-group">
            <label class="form-label">Bis</label>
            <input type="date" class="form-input" id="au-bis">
          </div>
        </div>
        <div class="au-actions">
          <button class="btn-primary btn-full" onclick="App.doExportCSV()">📊 CSV exportieren</button>
          <button class="btn-outline btn-full mt-8" onclick="App.doExportPDF()">📄 PDF Bericht</button>
        </div>
      </div>
    </div>
  </div>


  <!-- CALENDAR DAY OVERLAY -->
  <div class="modal" id="cal-overlay" style="z-index:700" onclick="event.target===this&&App.closeModal('cal-overlay')">
    <div class="modal-overlay" onclick="App.closeModal('cal-overlay')"></div>
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>Tageseintrag</h3>
        <button class="modal-close" onclick="App.closeModal('cal-overlay')">✕</button>
      </div>
      <div class="modal-body" id="cal-overlay-body"></div>
    </div>
  </div>
  <script src="drum.js"></script>
  <script src="feiertage.js"></script>
  <script src="data.js"></script>
  <script src="timer.js"></script>
  <script src="calendar.js"></script>
  <script src="zeitkonto.js"></script>
  <script src="urlaubskonto.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>

  <!-- Urlaubskonto Buchung Modal -->
  <div class="modal" id="uk-buchung-modal">
    <div class="modal-overlay" onclick="Urlaubskonto.closeBuchungModal()"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="uk-modal-title">Neue Urlaubskonto-Buchung</h3>
        <button class="modal-close" onclick="Urlaubskonto.closeBuchungModal()">✕</button>
      </div>
      <div class="modal-body edit-form">
        <input type="hidden" id="uk-id">
        <div class="form-group">
          <label class="form-label">Datum</label>
          <input type="date" class="form-input" id="uk-datum">
        </div>
        <div class="form-group">
          <label class="form-label">Art der Buchung</label>
          <div class="sign-tabs">
            <button class="sign-tab" id="uk-sign-minus" onclick="Urlaubskonto._setUkSign(1)">− Abzug</button>
            <button class="sign-tab active" id="uk-sign-plus" onclick="Urlaubskonto._setUkSign(-1)">+ Gutschrift</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Anzahl Tage</label>
          <input type="text" class="form-input" id="uk-tage" placeholder="z.B. 30 oder 2,5" inputmode="decimal">
        </div>
        <div class="form-group">
          <label class="form-label">Buchungstyp</label>
          <div class="quick-tags">
            <button class="uk-tag quick-tag" data-tag="Vortrag"      onclick="Urlaubskonto.setUkTag('Vortrag',this)">Vortrag</button>
            <button class="uk-tag quick-tag" data-tag="Jahresurlaub" onclick="Urlaubskonto.setUkTag('Jahresurlaub',this)">Jahresurlaub</button>
            <button class="uk-tag quick-tag" data-tag="Sonderurlaub" onclick="Urlaubskonto.setUkTag('Sonderurlaub',this)">Sonderurlaub</button>
            <button class="uk-tag quick-tag" data-tag="Korrektur"    onclick="Urlaubskonto.setUkTag('Korrektur',this)">Korrektur</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Kommentar</label>
          <textarea class="form-input" id="uk-kommentar" rows="2" placeholder="Optional…"></textarea>
        </div>
        <div class="en-action-row">
          <button class="btn-primary" style="flex:1;background:#4a7cb5;border-color:#4a7cb5" onclick="Urlaubskonto.saveBuchung()">Speichern</button>
          <button id="uk-delete-btn" class="btn-delete-entnahme" onclick="Urlaubskonto.deleteBuchung()" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Urlaubsantrag Modal -->
  <div class="modal" id="uk-antrag-modal">
    <div class="modal-overlay" onclick="Urlaubskonto.closeAntragModal()"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="uka-modal-title">Neuer Urlaubsantrag</h3>
        <button class="modal-close" onclick="Urlaubskonto.closeAntragModal()">✕</button>
      </div>
      <div class="modal-body edit-form">
        <input type="hidden" id="uka-id">
        <div class="form-group">
          <label class="form-label">Von</label>
          <input type="date" class="form-input" id="uka-von" onchange="Urlaubskonto.updateAntragTage()">
        </div>
        <div class="form-group">
          <label class="form-label">Bis</label>
          <input type="date" class="form-input" id="uka-bis" onchange="Urlaubskonto.updateAntragTage()">
        </div>
        <div class="form-group">
          <div id="uka-tage-info" class="uk-tage-info"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Kommentar</label>
          <textarea class="form-input" id="uka-kommentar" rows="2" placeholder="Optional…"></textarea>
        </div>
        <div class="en-action-row">
          <button class="btn-primary" style="flex:1;background:#4a7cb5;border-color:#4a7cb5" onclick="Urlaubskonto.saveAntrag()">Speichern</button>
          <button id="uka-delete-btn" class="btn-delete-entnahme" onclick="Urlaubskonto.deleteAntrag()" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
